<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-body-md antialiased">
<div class="w-full max-w-[420px] bg-surface rounded-xl shadow-[0_1px_3px_rgba(0,0,0,0.08),0_1px_2px_rgba(0,0,0,0.04)] p-8 border border-border-light relative overflow-hidden">
<!-- Decorative Header Brand Element -->
<div class="flex flex-col items-center mb-8">
<div class="h-12 w-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-sm text-on-primary">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-display-md text-display-md text-on-background">Create Account</h1>
<p class="font-body-md text-body-md text-text-muted mt-2 text-center">Join FinTrack to start managing your finances with precision and control.</p>
</div>
<form id="registerForm" action="#" class="space-y-5" method="POST">
<!-- Name Input (For our system, we use Username) -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1.5" for="authUsername">Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-tertiary text-[20px]" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 bg-surface border border-border-light rounded-DEFAULT font-body-md text-body-md text-on-background placeholder-text-tertiary focus:outline-none focus:ring-[3px] focus:ring-primary/15 focus:border-primary transition-shadow" id="authUsername" name="username" placeholder="e.g. janedoe" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1.5" for="authPassword">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-tertiary text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 bg-surface border border-border-light rounded-DEFAULT font-body-md text-body-md text-on-background placeholder-text-tertiary focus:outline-none focus:ring-[3px] focus:ring-primary/15 focus:border-primary transition-shadow" id="authPassword" name="password" placeholder="••••••••" required="" type="password"/>
<button id="toggleRegisterPassword" aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-tertiary hover:text-on-surface-variant transition-colors" type="button" onclick="togglePasswordVisibility('authPassword', 'toggleIconReg')">
<span class="material-symbols-outlined text-[20px]" id="toggleIconReg" data-icon="visibility">visibility</span>
</button>
</div>
<p class="mt-1.5 text-body-sm font-body-sm text-text-muted">Must be at least 8 characters.</p>
</div>
<!-- Confirm Password Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1.5" for="authConfirmPassword">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-tertiary text-[20px]" data-icon="lock_reset">lock_reset</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 bg-surface border border-border-light rounded-DEFAULT font-body-md text-body-md text-on-background placeholder-text-tertiary focus:outline-none focus:ring-[3px] focus:ring-primary/15 focus:border-primary transition-shadow" id="authConfirmPassword" name="confirm_password" placeholder="••••••••" required="" type="password"/>
<button id="toggleRegisterConfirmPassword" aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-tertiary hover:text-on-surface-variant transition-colors" type="button" onclick="togglePasswordVisibility('authConfirmPassword', 'toggleIconConfirmReg')">
<span class="material-symbols-outlined text-[20px]" id="toggleIconConfirmReg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button id="btnRegister" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-DEFAULT shadow-sm font-headline-sm text-headline-sm text-on-primary bg-primary hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors h-[40px] items-center mt-6" type="submit">
                Create Account
                <span class="material-symbols-outlined ml-2 text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-border-light text-center">
<p class="font-body-sm text-body-sm text-text-muted">
                Already have an account? 
                <a class="font-headline-sm text-headline-sm text-primary hover:text-on-primary-fixed-variant transition-colors ml-1 inline-flex items-center" href="login.html">
                    Log in here
                    <span class="material-symbols-outlined ml-0.5 text-[14px]" data-icon="login">login</span>
</a>
</p>
</div>
</div>
<!-- Toast Notification -->
<div id="toast" class="fixed bottom-4 right-4 z-50 transform transition-all duration-300 translate-y-full opacity-0 max-w-sm w-full bg-inverse-surface text-surface-container-lowest p-4 rounded-lg shadow-lg flex items-start gap-3 border-l-4"></div>
