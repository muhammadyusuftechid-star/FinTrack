<style>

<body class="min-h-screen flex items-center justify-center p-4">
<!-- Top AppBar (Suppressed per semantic shell mandate as this is a transactional page) -->
<!-- SideNav/BottomNav (Suppressed per semantic shell mandate) -->
<main class="w-full max-w-md">
<!-- Logo Area -->
<div class="text-center mb-8">
<h1 class="font-logo text-logo text-primary text-[28px] tracking-tight">FinTrack</h1>
<p class="font-body-md text-body-md text-text-muted mt-2">Manage your finances with clarity.</p>
</div>
<!-- Login Card -->
<div class="bg-surface rounded-xl login-card-shadow p-8 border border-border-light">
<h2 class="font-display-md text-display-md text-on-surface mb-6 text-center">Welcome Back</h2>
<form id="loginForm" action="#" class="space-y-5" method="POST">
<!-- Username Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="authUsername">Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-tertiary text-lg" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-[#D1D5DB] rounded-lg focus:ring-[3px] focus:ring-primary/15 focus:border-primary font-body-md text-body-md text-on-surface bg-surface transition-all" id="authUsername" name="username" placeholder="Masukkan username" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label-md text-label-md text-on-surface-variant" for="authPassword">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-surface-tint transition-colors" href="forgot-password.html">Lupa password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-tertiary text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 border border-[#D1D5DB] rounded-lg focus:ring-[3px] focus:ring-primary/15 focus:border-primary font-body-md text-body-md text-on-surface bg-surface transition-all" id="authPassword" name="password" placeholder="••••••••" required="" type="password"/>
<button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-muted hover:text-primary transition-colors" onclick="togglePasswordVisibility('authPassword', 'toggleIcon')" title="Tampilkan/Sembunyikan">
  <span class="material-symbols-outlined text-lg" id="toggleIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-[#D1D5DB] rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                        Ingat saya selama 30 hari
                    </label>
</div>
<!-- Submit Button -->
<button id="btnLogin" class="w-full bg-primary hover:bg-surface-tint text-on-primary font-headline-sm text-headline-sm py-2.5 rounded-lg transition-colors h-[40px] flex items-center justify-center" type="submit">
                    Masuk
                </button>
</form>
<!-- Divider -->
<div class="mt-6 mb-6 flex items-center justify-center">
<div class="border-t border-border-light flex-grow"></div>
<span class="px-3 font-body-sm text-body-sm text-text-muted bg-surface">ATAU</span>
<div class="border-t border-border-light flex-grow"></div>
</div>
<!-- Register Link -->
<p class="text-center font-body-md text-body-md text-on-surface-variant">
                Belum punya akun? 
                <a class="font-headline-sm text-headline-sm text-primary hover:text-surface-tint transition-colors ml-1" href="register.html">Daftar sekarang</a>
</p>
</div>
<!-- Footer links -->
<div class="mt-8 text-center space-x-4">
<a class="font-body-sm text-body-sm text-text-muted hover:text-on-surface-variant transition-colors" href="#">Privacy Policy</a>
<span class="text-border-light">•</span>
<a class="font-body-sm text-body-sm text-text-muted hover:text-on-surface-variant transition-colors" href="#">Terms of Service</a>
</div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-4 right-4 z-50 transform transition-all duration-300 translate-y-full opacity-0 max-w-sm w-full bg-inverse-surface text-surface-container-lowest p-4 rounded-lg shadow-lg flex items-start gap-3 border-l-4"></div>
