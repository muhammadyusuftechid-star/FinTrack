<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - FinTrack</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg-body);
      margin: 0;
    }
    .auth-container {
      background-color: var(--bg-card);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border-color);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header .logo {
      justify-content: center;
      margin-bottom: 16px;
    }
    .auth-title {
      font-size: 1.5rem;
      color: var(--text-main);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .auth-links {
      display: flex;
      justify-content: center;
      margin-top: 24px;
      font-size: 0.9rem;
    }
    .auth-link {
      color: var(--primary-main);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .auth-link:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <div class="logo">
        <span class="material-symbols-outlined logo-icon icon-fill" style="font-size: 2.5rem;">payments</span>
        <span class="logo-text" style="font-size: 1.5rem;">FinTrack</span>
      </div>
      <h1 class="auth-title">Lupa Password?</h1>
      <p class="auth-subtitle">Jangan khawatir! Masukkan username Anda untuk memulihkan akses.</p>
    </div>

    <form id="forgotPasswordForm">
      <div class="form-group" style="margin-bottom: 24px;">
        <label for="authUsername" class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">person</span>
          <input type="text" id="authUsername" class="form-input" placeholder="Masukkan username akun Anda" required>
        </div>
      </div>
      
      <button type="submit" class="btn-primary" id="btnReset" style="width: 100%; justify-content: center; background-color: var(--primary-main);">
        <span class="material-symbols-outlined">lock_reset</span>
        Pulihkan Password
      </button>

      <div class="auth-links">
        <a href="login.html" class="auth-link">
          <span class="material-symbols-outlined" style="font-size: 1.1rem;">arrow_back</span>
          Kembali ke halaman Login
        </a>
      </div>
    </form>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="assets/js/auth.js"></script>
</body>
</html>
