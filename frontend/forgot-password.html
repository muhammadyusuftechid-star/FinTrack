<body class="min-h-screen flex items-center justify-center p-4">
<main class="w-full max-w-[420px]">
<!-- Logo Area -->
<div class="text-center mb-8">
<div class="flex flex-col items-center mb-2">
<div class="h-12 w-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-sm text-on-primary">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-logo text-logo text-primary text-[28px] tracking-tight">FinTrack</h1>
</div>
<p class="font-body-md text-body-md text-text-muted mt-2">Manage your finances with clarity.</p>
</div>
<!-- Forgot Password Card -->
<div class="bg-surface rounded-xl login-card-shadow p-8 border border-border-light">
<h2 class="font-display-md text-display-md text-on-surface mb-2 text-center">Lupa Password?</h2>
<p class="font-body-md text-body-md text-text-muted mb-6 text-center">Jangan khawatir! Masukkan username Anda untuk memulihkan akses.</p>

<form id="forgotPasswordForm" action="#" class="space-y-5" method="POST">
<!-- Username Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="authUsername">Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-tertiary text-lg" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-[#D1D5DB] rounded-lg focus:ring-[3px] focus:ring-primary/15 focus:border-primary font-body-md text-body-md text-on-surface bg-surface transition-all" id="authUsername" name="username" placeholder="Masukkan username akun Anda" required="" type="text"/>
</div>
</div>

<!-- Submit Button -->
<button id="btnReset" class="w-full bg-primary hover:bg-surface-tint text-on-primary font-headline-sm text-headline-sm py-2.5 rounded-lg transition-colors h-[40px] flex items-center justify-center mt-2" type="submit">
    <span class="material-symbols-outlined mr-2 text-[18px]">lock_reset</span>
    Pulihkan Password
</button>
</form>

<!-- Login Link -->
<div class="mt-6 pt-6 border-t border-border-light text-center">
<p class="font-body-sm text-body-sm text-text-muted">
    <a class="font-headline-sm text-headline-sm text-primary hover:text-on-primary-fixed-variant transition-colors inline-flex items-center" href="login.html">
        <span class="material-symbols-outlined mr-1 text-[16px]">arrow_back</span>
        Kembali ke halaman Login
    </a>
</p>
</div>

</div>
<!-- Footer links -->
<div class="mt-8 text-center space-x-4">
<a class="font-body-sm text-body-sm text-text-muted hover:text-on-surface-variant transition-colors" href="#">Privacy Policy</a>
<span class="text-border-light">•</span>
<a class="font-body-sm text-body-sm text-text-muted hover:text-on-surface-variant transition-colors" href="#">Terms of Service</a>
</div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-4 right-4 z-50 transform transition-all duration-300 translate-y-full opacity-0 max-w-sm w-full bg-inverse-surface text-surface-container-lowest p-4 rounded-lg shadow-lg flex items-start gap-3 border-l-4"></div>
